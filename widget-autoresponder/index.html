<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoResponder - Bot de Objeciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .response-box {
            background: #f0f9ff;
            border: 2px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 80px;
            color: #333;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }

        .response-box.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .copy-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            margin-top: 10px;
        }

        .copy-btn:hover:not(:disabled) {
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            display: none;
        }

        .history.active {
            display: block;
        }

        .history h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .history-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 12px;
            color: #666;
        }

        .history-item:hover {
            background: #e8e8e8;
        }

        .history-item .time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .tip-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #92400e;
        }

        .tip-box strong {
            display: block;
            margin-bottom: 5px;
            color: #b45309;
        }

        .loading {
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ AutoResponder</h1>
            <p>Bot inteligente para responder objeciones de pasajeros</p>
        </div>

        <div class="form-group">
            <label for="objection">📝 Objeción del Pasajero</label>
            <textarea
                id="objection"
                placeholder="Pega aquí el mensaje del pasajero. Ej: 'El precio es muy caro comparado con la competencia'"
            ></textarea>
        </div>

        <button id="generateBtn" onclick="generateResponse()">
            <span id="btnText">Generar Respuesta</span>
        </button>

        <div id="responseBox" class="response-box"></div>
        <button id="copyBtn" class="copy-btn" style="display: none;" onclick="copyToClipboard()">
            📋 Copiar Respuesta
        </button>

        <div id="history" class="history">
            <h3>📋 Historial (últimas respuestas)</h3>
            <div id="historyList"></div>
        </div>

        <div class="tip-box">
            <strong>💡 Consejos:</strong>
            Copia el mensaje del pasajero, pégalo aquí, genera la respuesta y cópiala directamente a WhatsApp. ¡Simple y efectivo!
        </div>
    </div>

    <script>
        let history = [];
        const API_URL = 'https://api.anthropic.com/v1/messages';

        async function generateResponse() {
            const objection = document.getElementById('objection').value.trim();
            
            if (!objection) {
                alert('Por favor ingresa una objeción');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const originalText = btnText.textContent;
            
            btn.disabled = true;
            btnText.textContent = '⚡ Generando...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 800,
                        system: `Eres un experto en servicio al cliente para transporte de pasajeros. Genera respuestas profesionales, amables y breves (máximo 2 párrafos) listos para WhatsApp. Sé empático, ofrece soluciones y una llamada a la acción clara. Responde en el mismo idioma del usuario.`,
                        messages: [
                            {
                                role: 'user',
                                content: `Objeción: "${objection}"\n\nGenera una respuesta para WhatsApp.`
                            }
                        ],
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Error al generar respuesta');
                }

                const generatedText = data.content[0].text;
                const responseBox = document.getElementById('responseBox');
                responseBox.textContent = generatedText;
                responseBox.classList.add('active');
                document.getElementById('copyBtn').style.display = 'block';

                // Agregar al historial
                history.unshift({
                    objection: objection.substring(0, 50) + (objection.length > 50 ? '...' : ''),
                    response: generatedText,
                    time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
                });

                if (history.length > 5) history.pop();
                updateHistory();

            } catch (error) {
                const responseBox = document.getElementById('responseBox');
                responseBox.innerHTML = `<div class="error">❌ Error: ${error.message}. Verifica tu conexión e intenta nuevamente.</div>`;
                responseBox.classList.add('active');
                console.error('Error:', error);
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        }

        function copyToClipboard() {
            const responseBox = document.getElementById('responseBox');
            const text = responseBox.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ ¡Copiado!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                alert('No se pudo copiar. Intenta nuevamente.');
            });
        }

        function updateHistory() {
            const historyDiv = document.getElementById('history');
            const historyList = document.getElementById('historyList');
            
            if (history.length > 0) {
                historyDiv.classList.add('active');
                historyList.innerHTML = history.map((item, idx) => `
                    <div class="history-item" onclick="loadFromHistory('${idx}')">
                        <strong>${item.objection}</strong>
                        <div class="time">🕐 ${item.time}</div>
                    </div>
                `).join('');
            }
        }

        function loadFromHistory(idx) {
            const item = history[idx];
            const responseBox = document.getElementById('responseBox');
            responseBox.textContent = item.response;
            responseBox.classList.add('active');
            document.getElementById('copyBtn').style.display = 'block';
        }

        // Permitir Enter para generar
        document.getElementById('objection').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateResponse();
            }
        });
    </script>
</body>
</html>
